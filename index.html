<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PM Coach Diary | 個人成長日記</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e8e8e8; }
    header { padding: 48px 24px 32px; max-width: 720px; margin: 0 auto; border-bottom: 1px solid #222; }
    header h1 { font-size: 1.8rem; font-weight: 700; color: #fff; }
    header p { margin-top: 8px; color: #888; font-size: 0.95rem; }
    .entries { max-width: 720px; margin: 0 auto; padding: 32px 24px; }
    .entry { margin-bottom: 48px; padding-bottom: 48px; border-bottom: 1px solid #1e1e1e; }
    .entry-date { font-size: 0.8rem; color: #555; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .entry-title { font-size: 1.4rem; font-weight: 600; color: #fff; margin-bottom: 16px; line-height: 1.4; }
    .entry-body { color: #aaa; line-height: 1.8; font-size: 0.95rem; }
    .entry-body p { margin-bottom: 12px; }
    .entry-tags { margin-top: 20px; display: flex; gap: 8px; flex-wrap: wrap; }
    .tag { background: #1a1a1a; border: 1px solid #2a2a2a; color: #666; font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; }
    .empty { text-align: center; padding: 80px 24px; color: #444; }
    .empty p { font-size: 1.1rem; }
  </style>
</head>
<body>
  <header>
    <h1>PM Coach Diary</h1>
    <p>個人成長 × 創業實踐 — 由 Lenny's wisdom + Claude AI 驅動</p>
  </header>
  <div class="entries">
    <div class="empty">
      <p>第一篇日記即將誕生 ✦</p>
    </div>
  </div>
</body>
</html>
